      const html = rows.map((row) => {
        const exposure = row.exposureImpact || {};
        return '<tr>' +
          '<td>' + badge(row.status || (row.selected ? "selected" : "suppressed"), statusTone(row.status || (row.selected ? "selected" : "suppressed"))) + '<div class="subtle">' + esc(clean(row.suppressionReason || "", 220)) + '</div></td>' +
          '<td><strong>' + esc(row.primaryAsset || "") + '</strong><div class="subtle">' + esc(row.confidence || "") + '</div></td>' +
          '<td>' + esc(clean(row.summary || "", 320)) + '</td>' +
          '<td>' + esc(exposure.total_exposure_pct == null ? "--" : exposure.total_exposure_pct + "%") + '<div class="subtle">' + esc(clean(exposure.calculation || "", 240)) + '</div></td>' +
          '<td><pre>' + esc(decisionLensText(row.decisionLens || (row.payload && (row.payload.decision_lens || row.payload.decisionLens))) || "--") + '</pre></td>' +
          '<td>' + esc((row.eventRefs || []).join(", ")) + '</td>' +
          '<td><details><summary class="subtle">assessment JSON</summary>' + jsonBlock(row) + '</details></td>' +
          '</tr>';
      }).join("");
      return '<div class="table-wrap"><table><thead><tr><th>Status / reason</th><th>Asset</th><th>Assessment</th><th>Exposure impact</th><th>Decision lens</th><th>Event refs</th><th>Raw</th></tr></thead><tbody>' + html + '</tbody></table></div>';
    }

    function renderAnomalyAttributions(run) {
      const rows = anomalyAttributionsForRun(run);
      if (!rows.length) {
        return '<div class="empty">No computed anomalies or anomaly attributions persisted for this run.</div>';
      }
      const html = rows.map((row) => {
        const metrics = row.anomalyMetrics || (row.attribution && row.attribution.payload && (row.attribution.payload.anomaly_metrics || row.attribution.payload.anomalyMetrics)) || {};
        const attribution = row.attribution || {};
        const packet = row.attributionPacket || {};
        const status = row.finalStatus || {};
        const marketLine = metrics.marketDataSymbol && metrics.marketDataSymbol !== (row.symbol || attribution.primaryAsset)
          ? "market: " + metrics.marketDataSymbol + (metrics.marketDataBasis ? " / " + metrics.marketDataBasis : "")
          : (metrics.marketDataBasis || "");
        const packetLine = packet.attributionPacketId
          ? badge("agent packet", packet.agentStatus === "completed" ? "violet" : "amber") +
            '<div class="subtle">' + esc([
              packet.attributionStatus || "",
              packet.confidence ? "confidence " + packet.confidence : "",
              packet.skillhubSkill || "",
            ].filter(Boolean).join(" / ")) + '</div>' +
            (packet.summary ? '<div class="subtle">' + esc(clean(packet.summary, 220)) + '</div>' : '')
          : '<div class="subtle">No per-asset attribution packet found.</div>';
        const lens = attribution.decisionLens || (attribution.payload && (attribution.payload.decision_lens || attribution.payload.decisionLens)) || row.decisionLens || null;
        return '<tr>' +
          '<td>' + badge(status.status || "unknown", statusTone(status.status)) + '<div class="subtle">' + esc(clean(status.reason || "", 240)) + '</div></td>' +
          '<td><strong>' + esc(row.symbol || attribution.primaryAsset || "") + '</strong><div class="subtle">' + esc((metrics.triggerKinds || []).join(", ")) + (marketLine ? " / " + esc(marketLine) : "") + '</div></td>' +
          '<td>' + esc(fmtNum(metrics.oneDayPct, 2)) + '%<div class="subtle">' + esc(metrics.oneDayBasis || "") + '</div></td>' +
          '<td>' + esc(fmtNum(metrics.fiveDayPct, 2)) + '%</td>' +
          '<td>' + esc(fmtNum(metrics.cumulativeVolumeMultiple || metrics.sessionCumulativeRvol || metrics.volumeMultiple, 2)) + 'x</td>' +
          '<td>' + badge(attribution.attributionStatus || "no attribution", attribution.attributionStatus === "plausible" || attribution.attributionStatus === "confirmed" ? "green" : "amber") + '<div class="subtle">' + esc(clean(attribution.summary || row.summary || "", 260)) + '</div>' + packetLine + '</td>' +
          '<td><pre>' + esc(decisionLensText(lens) || "--") + '</pre></td>' +
          '<td><details><summary class="subtle">anomaly + attribution JSON</summary>' + jsonBlock(row) + '</details></td>' +
          '</tr>';
      }).join("");
      return '<div class="notice">Anomalies are computed facts, not candidates. Each computed anomalous asset first gets a per-asset attribution-agent packet, then the final analyst turns that packet into final selected/suppressed wording.</div>' +
        '<div class="table-wrap"><table><thead><tr><th>Final status</th><th>Asset</th><th>1D</th><th>5D</th><th>Volume</th><th>Attribution</th><th>Decision lens</th><th>Raw</th></tr></thead><tbody>' + html + '</tbody></table></div>';
    }

    function renderFinalStatusLedger(run) {
      const statuses = finalStatusesForRun(run);
      const eventStatuses = statuses.eventCandidates || [];
      const anomalyStatuses = statuses.anomalies || [];
      if (!eventStatuses.length && !anomalyStatuses.length) {
        return '<div class="empty">No final status ledger is available for this run.</div>';
      }
      const eventRows = eventStatuses.map((row) => '<tr>' +
        '<td>' + badge("event", "blue") + '</td>' +
        '<td>' + esc(row.symbol || "") + '</td>' +
        '<td>' + esc(row.title || row.candidateId || "") + '</td>' +
        '<td>' + badge(row.status || "unknown", statusTone(row.status)) + '</td>' +
        '<td>' + esc(clean(row.reason || "", 420)) + '</td>' +
        '<td>' + esc(row.linkedEventFindingId || "") + '</td>' +
        '</tr>').join("");
      const anomalyRows = anomalyStatuses.map((row) => '<tr>' +
        '<td>' + badge("anomaly", "violet") + '</td>' +
        '<td>' + esc(row.symbol || "") + '</td>' +
        '<td>' + esc(row.anomalyId || "") + '</td>' +
        '<td>' + badge(row.status || "unknown", statusTone(row.status)) + '</td>' +
        '<td>' + esc(clean(row.reason || "", 420)) + '</td>' +
        '<td>' + esc(row.linkedAttributionFindingId || "") + '</td>' +
        '</tr>').join("");
      return '<div class="notice">This ledger is the final state of the long list after the analyst pass. Suppressed, not_qualified, and missing_attribution rows should always carry the reason that kept them out of the notification.</div>' +
        '<div class="table-wrap"><table><thead><tr><th>Lane</th><th>Asset</th><th>Item</th><th>Status</th><th>Reason</th><th>Linked assessment</th></tr></thead><tbody>' + (eventRows + anomalyRows || '<tr><td colspan="6">No statuses.</td></tr>') + '</tbody></table></div>';
    }

    function renderRunDetails(run) {
      if (!run) return '<div class="empty">No official cron audit row loaded yet. The next scheduled online push pipeline run will appear here after it finishes.</div>';
      const steps = parseJson(run.stepLogJson, []);
      const fetch = parseJson(run.dataFetchSummaryJson, {});
      const llm = parseJson(run.llmDecisionJson, {});
      const output = parseJson(run.outputSummaryJson, {});
      const persist = parseJson(run.persistSummaryJson, {});
      const warnings = parseJson(run.warningsJson, []);
      const deltas = runDeltas(run);
      const decision = run.alertDecision || output.alertDecision || "no_push";
      const duration = Number(run.durationMs);
      const runKind = run.matchKind === "matched_audit" || (!run.historicalCron && !run.legacy)
        ? "full audit"
        : run.matchKind === "matched_decision"
          ? "decision-only"
          : "platform-only";
      const legacyNotice = run.historicalCron
        ? '<div class="notice">Historical cron row from deploy metadata. ' + esc(runKind) + ' means: matched_audit has full persisted steps; decision-only has final decision fields only; platform-only confirms the cron ran but does not invent missing intermediate logs.</div>'
        : "";
      const metrics = [
        renderMetric("Run time", hkt(rowRunAt(run)), run.status || "completed"),
        renderMetric("Decision", decision, output.skipReason || run.skipReason || run.reason || ""),
        renderMetric("Duration", Number.isFinite(duration) ? (duration / 1000).toFixed(1) + "s" : "--", run.historicalCron ? "deploy run duration" : "runtime measured inside automation"),
        renderMetric("Event", fmtNum(fetch.rawEventCount || output.eventRows || 0, 0), "normalized " + fmtNum(fetch.normalizedEventCount || 0, 0)),
        renderMetric("Persisted", fmtNum(persist.totalRecordsAdded, 0), "tracked append/update count"),
      ].join("");
      const deltasTable = renderDeltasTable(deltas, false);
      const notification = output.notificationPreview || run.notificationPreview || run.notificationMessage || "";
      const rawEvents = rawEventsForRun(run);
      const eventCandidates = eventCandidatesForRun(run);
      const qualifiedEvents = qualifiedEventsForRun(run);
      const anomalyRows = anomalyAttributionsForRun(run);
      const finalStatuses = finalStatusesForRun(run);
      const finalStatusCount = (finalStatuses.eventCandidates || []).length + (finalStatuses.anomalies || []).length;
      return '<section class="panel">' +
        '<div class="panel-head"><h2>Run ' + esc(hkt(rowRunAt(run))) + '</h2><div>' + badge(decision, decision === "push" ? "green" : decision === "platform_only" ? "amber" : "blue") + " " + badge(runKind, runKind === "full audit" ? "green" : "amber") + '</div></div>' +
        '<div class="panel-body">' +
        legacyNotice +
        '<div class="metric-grid">' + metrics + '</div>' +
        '<details class="section" open><summary><h3>Search Expansion Trace</h3>' + badge(searchExpansionTraceForRun(run).toolCallCount + " calls", "violet") + '</summary><div class="section-content">' + renderSearchExpansionTrace(run) + '</div></details>' +
        '<div class="artifact-grid">' +
        '<details class="section" open><summary><h3>Raw Events</h3>' + badge(rawEvents.length + " rows", "blue") + '</summary><div class="section-content">' + renderRawEvents(run) + '</div></details>' +
        '<details class="section" open><summary><h3>Event Candidates</h3>' + badge(eventCandidates.length + " items", "blue") + '</summary><div class="section-content">' + renderEventCandidates(run) + '</div></details>' +
        '<details class="section" open><summary><h3>Qualified Events</h3>' + badge(qualifiedEvents.length + " assessed", "green") + '</summary><div class="section-content">' + renderQualifiedEvents(run) + '</div></details>' +
        '<details class="section" open><summary><h3>Anomalies & Attributions</h3>' + badge(anomalyRows.length + " assets", "violet") + '</summary><div class="section-content">' + renderAnomalyAttributions(run) + '</div></details>' +
        '<details class="section" open><summary><h3>Final Status Ledger</h3>' + badge(finalStatusCount + " statuses", "blue") + '</summary><div class="section-content">' + renderFinalStatusLedger(run) + '</div></details>' +
        '</div>' +
        '<div class="split">' +
        '<details class="section" open><summary><h3>Data Fetch Summary</h3>' + badge((fetch.marketDataCoverage || []).length + " assets", "blue") + '</summary><div class="section-content">' + renderFetch(fetch) + '</div></details>' +
        '<details class="section" open><summary><h3>Runtime Calls</h3>' + badge(runtimeCallBadge(llm), runtimeCallTone(llm)) + '</summary><div class="section-content">' + renderRuntimeCalls(llm) + '</div></details>' +
        '</div>' +
        '<details class="section" open><summary><h3>Step-by-step Processing</h3>' + badge(steps.length + " steps", "green") + '</summary><div class="section-content">' + (steps.length ? steps.map(renderStep).join("") : '<div class="empty">No step log available.</div>') + '</div></details>' +
        '<div class="split">' +
        '<details class="section" open><summary><h3>Persist Delta For This Run</h3>' + badge(deltas.length + " rows", "blue") + '</summary><div class="section-content">' + deltasTable + '</div></details>' +
        '<details class="section" open><summary><h3>Final Output</h3>' + badge(output.alertDecision || decision, decision === "push" ? "green" : "blue") + '</summary><div class="section-content">' +
        '<div class="kv-grid"><div class="kv-box"><b>Notification preview</b><pre>' + esc(notification || "No notification body.") + '</pre></div><div class="kv-box"><b>Output summary</b>' + jsonBlock(output) + '</div></div>' +
        (warnings && warnings.length ? '<div class="kv-box" style="margin-top:10px"><b>Warnings</b>' + jsonBlock(warnings) + '</div>' : "") +
        '</div></details>' +
        '</div>' +
        '</div></section>';
    }

    function renderFetch(fetch) {
      const coverage = fetch.marketDataCoverage || [];
      const rows = coverage.map((row) => '<tr><td>' + esc(row.symbol) + '</td><td>' + esc(row.dailyBars) + '</td><td>' + esc(row.minuteBars == null ? "n/a" : row.minuteBars) + '</td><td>' + esc(row.hourlyBars) + '</td><td>' + esc(row.latestDailyBarHkt) + '</td><td>' + esc(row.latestMinuteBarHkt || "n/a") + '</td><td>' + esc(row.latestHourlyBarHkt) + '</td></tr>').join("");
      const breaking = fetch.breakingNewsSummary || {};
      const themeNews = fetch.themeNewsSummary || {};
      const themeExtraction = fetch.themeExtractionSummary || {};
      return '<div class="kv-grid">' +
        '<div class="kv-box"><b>Fetch window and counts</b>' + jsonBlock({
          windowStartHkt: fetch.windowStartHkt,
          windowEndHkt: fetch.windowEndHkt,
          rawEventCount: fetch.rawEventCount,
          rawEventSourceCounts: fetch.rawEventSourceCounts,
          normalizedEventDedupeCounts: fetch.normalizedEventDedupeCounts,
          macroKeys: fetch.macroKeys,
          warningCount: fetch.warningCount,
        }) + '</div>' +
        '<div class="kv-box"><b>Macro freshness</b>' + jsonBlock(fetch.macroFreshness || []) + '</div>' +
        '<div class="kv-box"><b>Alva Ask theme extraction</b>' + jsonBlock(themeExtraction) + '</div>' +
        '<div class="kv-box"><b>Pi event-search summary</b>' + jsonBlock(breaking) + '</div>' +
        '<div class="kv-box"><b>Pi theme-news lane summary</b>' + jsonBlock(themeNews) + '</div>' +
        '<div class="kv-box"><b>Market data coverage</b><table><thead><tr><th>Asset</th><th>1d bars</th><th>1min bars</th><th>1h bars</th><th>Latest 1d</th><th>Latest 1min</th><th>Latest 1h</th></tr></thead><tbody>' + (rows || '<tr><td colspan="7">No coverage rows.</td></tr>') + '</tbody></table></div>' +
        '</div>';
    }

    function runtimeCallBadge(llm) {
      if (!llm || (!llm.portfolioReader && !llm.analyst && !llm.breakingNews && !llm.themeNews && !llm.themeExtractor && !llm.anomalyAttributionAgents)) return "legacy";
      const breakingEnv = llm.breakingNews && llm.breakingNews.environment ? String(llm.breakingNews.environment) : "";
      const themeEnv = llm.themeNews && llm.themeNews.environment ? String(llm.themeNews.environment) : "";
      const themeExtractorEnv = llm.themeExtractor && llm.themeExtractor.environment ? String(llm.themeExtractor.environment) : "";
      const anomalyAttributionEnv = llm.anomalyAttributionAgents && llm.anomalyAttributionAgents.environment ? String(llm.anomalyAttributionAgents.environment) : "";
      const portfolioEnv = llm.portfolioReader && llm.portfolioReader.environment ? String(llm.portfolioReader.environment) : "";
      const analystEnv = llm.analyst && llm.analyst.environment ? String(llm.analyst.environment) : "";
      if (analystEnv && analystEnv !== "not_called") return analystEnv;
      if (anomalyAttributionEnv && anomalyAttributionEnv !== "not_called") return anomalyAttributionEnv;
      if (themeExtractorEnv && themeExtractorEnv !== "not_called") return themeExtractorEnv;
      if (breakingEnv && breakingEnv !== "not_called_or_failed") return breakingEnv;
      if (themeEnv) return themeEnv;
      if (portfolioEnv) return portfolioEnv;
      return "stored";
    }

    function runtimeCallTone(llm) {
      const label = runtimeCallBadge(llm);
      if (label.indexOf("Alva Ask") >= 0) return "violet";
      if (label.indexOf("Code") >= 0) return "green";
      return "blue";
    }

    function renderRuntimeCalls(llm) {
      if (!llm || (!llm.portfolioReader && !llm.analyst && !llm.breakingNews && !llm.themeNews && !llm.themeExtractor && !llm.anomalyAttributionAgents)) return '<div class="empty">No runtime call detail available for this legacy run.</div>';
      return '<div class="kv-grid">' +
        '<div class="kv-box"><b>Portfolio ingest / API read</b>' + jsonBlock(llm.portfolioReader || {}) + '</div>' +
        '<div class="kv-box"><b>Alva Ask theme extraction</b>' + jsonBlock(llm.themeExtractor || {}) + '</div>' +
        '<div class="kv-box"><b>Pi event-search loop</b>' + jsonBlock(llm.breakingNews || {}) + '</div>' +
        '<div class="kv-box"><b>Pi theme-news lane</b>' + jsonBlock(llm.themeNews || {}) + '</div>' +
        '<div class="kv-box"><b>Alva Ask anomaly attribution agents</b>' + jsonBlock(llm.anomalyAttributionAgents || {}) + '</div>' +
        '<div class="kv-box"><b>Analyst gate</b>' + jsonBlock(llm.analyst || {}) + '</div>' +
        '</div>';
    }

    function renderDeltasTable(rows, compact) {
      if (!rows.length) return '<div class="empty">No delta rows for this selection.</div>';
      const html = rows.map((row) => {
        const delta = parseJson(row.deltaJson, {});
        return '<tr>' +
          '<td>' + esc(shortHkt(rowRunAt(row))) + '</td>' +
          '<td>' + esc(row.fileKey || "") + '</td>' +
          '<td>' + badge(row.operation || "", row.operation === "append" ? "green" : row.operation === "put" ? "violet" : "amber") + '</td>' +
          '<td>' + esc(row.recordsAdded == null ? "--" : row.recordsAdded) + '</td>' +
          '<td>' + esc(row.deltaSummary || "") + (compact ? "" : '<details><summary class="subtle">delta JSON</summary>' + jsonBlock(delta) + '</details>') + '</td>' +
          '</tr>';
      }).join("");
      return '<div class="table-wrap"><table><thead><tr><th>Run</th><th>File</th><th>Op</th><th>Rows</th><th>Delta</th></tr></thead><tbody>' + html + '</tbody></table></div>';
    }

    function renderRunsTab() {
      return '<div class="layout">' + renderRunList() + renderRunDetails(selectedRun()) + '</div>';
    }

    function renderFileList() {
      const buttons = FILES.map((file) => {
        const count = rowsForFile(file.key).length;
        return '<button class="btn btn-secondary btn-small file-btn ' + (state.selectedFile === file.key ? "is-active" : "") + '" data-file="' + esc(file.key) + '">' +
          '<strong>' + esc(file.label) + '</strong><span>' + esc(file.key + " · " + count + " loaded") + '</span>' +
          '</button>';
      }).join("");
      return '<aside class="panel"><div class="panel-head"><h2>Persist Files</h2>' + badge(FILES.length + " tracked", "blue") + '</div><div class="file-list">' + buttons + '</div></aside>';
    }

    function renderFileDetails() {
      const meta = getMeta(state.selectedFile);
      const rows = rowsForFile(state.selectedFile);
      const latestRows = latestRowsForFile(state.selectedFile);
      const fileDeltas = state.persistRows
        .filter((row) => row.fileKey === state.selectedFile)
        .sort((a, b) => rowRunAt(b) - rowRunAt(a));
      const latestRun = latestRows.length ? Math.max.apply(null, latestRows.map(rowRunAt)) : 0;
      const latestPreview = latestRows.slice(0, 60);
      const columns = inferColumns(latestPreview);
      const table = renderRowsTable(latestPreview, columns);
      const raw = latestPreview.length === 1 ? latestPreview[0] : latestPreview;
      return '<section class="panel">' +
        '<div class="panel-head"><h2>' + esc(meta.label) + '</h2><div>' + badge(meta.type, meta.type === "feed_kv" ? "violet" : "green") + " " + badge(rows.length + " rows loaded", "blue") + '</div></div>' +
        '<div class="panel-body">' +
        '<div class="metric-grid">' +
        renderMetric("File key", meta.key, meta.description) +
        renderMetric("Latest version", latestRun ? hkt(latestRun) : "n/a", latestRows.length + " rows in latest run/version") +
        renderMetric("Storage type", meta.type, meta.path) +
        renderMetric("Deltas", fileDeltas.length, "recorded by audit.persist_delta") +
        renderMetric("Feed id", String(FEED_ID), FEED_NAME) +
        '</div>' +
        (meta.key === "kv_state" ? '<div class="notice">KV state is tracked through audit.persist_delta. The playbook does not read private KV contents directly; it shows which keys were updated and the recorded delta summary.</div>' : "") +
        '<details class="section" open><summary><h3>Latest Version Rows</h3>' + badge(latestPreview.length + " shown", "green") + '</summary><div class="section-content">' + table + '</div></details>' +
        '<details class="section"><summary><h3>Latest Raw JSON</h3>' + badge("readable", "blue") + '</summary><div class="section-content">' + jsonBlock(raw) + '</div></details>' +
        '<details class="section" open><summary><h3>Every Run Delta For This File</h3>' + badge(fileDeltas.length + " deltas", "violet") + '</summary><div class="section-content">' + renderDeltasTable(fileDeltas, false) + '</div></details>' +
        '</div></section>';
    }

    function inferColumns(rows) {
      const preferred = ["date", "runAtMs", "fileKey", "operation", "recordsAdded", "accountId", "symbol", "assetClass", "weight", "alertDecision", "urgency", "sourceType", "dedupeStatus", "title", "findingId", "findingType", "selected", "summary", "deltaSummary"];
      const keys = [];
      rows.forEach((row) => {
        Object.keys(row || {}).forEach((key) => {
          if (keys.indexOf(key) < 0) keys.push(key);
        });
      });
      const out = preferred.filter((key) => keys.indexOf(key) >= 0);
      keys.forEach((key) => {
        if (out.length < 9 && out.indexOf(key) < 0 && !/Json$/.test(key) && key !== "body") out.push(key);
      });
      return out.slice(0, 9);
    }

    function cellValue(row, key) {
      if (key === "date" || key === "runAtMs") return shortHkt(row[key]);
      const value = row[key];
      if (value && typeof value === "object") return JSON.stringify(value);
      return clean(value, 220);
    }

    function renderRowsTable(rows, columns) {
      if (!rows.length) return '<div class="empty">No rows loaded for this file.</div>';
      const head = columns.map((key) => '<th>' + esc(key) + '</th>').join("");
      const body = rows.map((row) => '<tr>' + columns.map((key) => '<td>' + esc(cellValue(row, key)) + '</td>').join("") + '</tr>').join("");
      return '<div class="table-wrap"><table><thead><tr>' + head + '</tr></thead><tbody>' + body + '</tbody></table></div>';
    }

    function renderFilesTab() {
      return '<div class="file-layout">' + renderFileList() + renderFileDetails() + '</div>';
    }

    function render() {
      const app = document.getElementById("app");
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.tab === state.tab);
      });
      if (state.error) {
        app.innerHTML = '<div class="empty">Failed to load audit data: ' + esc(state.error.message || state.error) + '</div>';
        return;
      }
      if (!state.loaded) {
        app.innerHTML = '<div class="empty">Loading automation audit data...</div>';
        return;
      }
      app.innerHTML = state.tab === "runs" ? renderRunsTab() : renderFilesTab();
      bindDynamicEvents();
    }

    function bindDynamicEvents() {
      document.querySelectorAll("[data-run]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.selectedRunAtMs = Number(btn.dataset.run);
          render();
        });
      });
      document.querySelectorAll("[data-run-filter]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.runFilter = btn.dataset.runFilter;
          render();
        });
      });
      document.querySelectorAll("[data-file]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.selectedFile = btn.dataset.file;
          render();
        });
      });
    }

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.tab = btn.dataset.tab;
        render();
      });
    });

    loadData();
  </script>
</body>
</html>
